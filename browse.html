<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony - Music Discovery</title>
    <meta name="description" content="Discover new talent and share your music on Symphony.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass">
        <div class="nav-container">
            <a href="browse.html" class="logo">
                <i class="ph-fill ph-music-notes-simple"></i>
                <span class="logo-text">Symphony</span>
            </a>
            <div class="nav-links">
                <a href="browse.html" class="active">Browse</a>
                <a href="upload.html">Upload</a>
                <a href="favourites.html" id="navFavouritesLink" style="display:none;">Favourites</a>
                <a href="profile.html" id="navProfileLink" style="display:none;">My Profile</a>
                <a href="studios.html" id="navStudiosLink" style="display:none;">Studios</a>
                <a href="chat.html" id="navChatLink" style="display:none;">Messages</a>
                <a href="index.html" id="navAuthLink">Login</a>
                <a href="#" id="navLogoutLink" style="display:none; color:var(--accent-color);">Logout</a>
            </div>
            <button class="menu-toggle" aria-label="Toggle Menu">
                <i class="ph ph-list"></i>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1>Discover Talent</h1>
                <p>Find your next collaborator or perfect track</p>
            </div>
            
            <div class="filter-controls">
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search artists, tracks...">
                </div>
                <div class="filter-group">
                    <select id="genreFilter" class="glass-select">
                        <option value="all">All Genres</option>
                        <option value="pop">Pop</option>
                        <option value="hiphop">Hip Hop</option>
                        <option value="electronic">Electronic</option>
                        <option value="rock">Rock</option>
                        <option value="rnb">R&B</option>
                        <option value="jazz">Jazz</option>
                        <option value="classical">Classical</option>
                    </select>
                    <select id="typeFilter" class="glass-select">
                        <option value="all">All Types</option>
                        <option value="instrumental">Instrumental</option>
                        <option value="full">Full Composition</option>
                    </select>
                </div>
            </div>
        </header>

        <section class="tracks-grid" id="tracksContainer">
            <!-- Loading state -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading tracks...</p>
            </div>
            <!-- Tracks will be injected here via JS -->
        </section>
    </main>

    <!-- Global Audio Player (Hidden until play is clicked) -->
    <div class="global-player" id="globalPlayer">
        <div class="player-info">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=150&auto=format&fit=crop" alt="Cover" class="player-cover" id="playerCover">
            <div class="player-text">
                <h4 id="playerTitle">Track Title</h4>
                <p id="playerArtist">Artist Name</p>
            </div>
        </div>
        <div class="player-controls">
            <button class="control-btn" id="prevBtn"><i class="ph-fill ph-skip-back"></i></button>
            <button class="control-btn play-btn" id="playPauseBtn"><i class="ph-fill ph-play"></i></button>
            <button class="control-btn" id="nextBtn"><i class="ph-fill ph-skip-forward"></i></button>
        </div>
        <div class="player-progress">
            <span id="currentTime">0:00</span>
            <div class="progress-bar-container" id="progressBarContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <span id="durationTime">0:00</span>
        </div>
        <audio id="audioElement"></audio>
    </div>

    <!-- AI Chatbot Widget -->
    <div class="ai-bot-widget" id="aiBotWidget">
        <button class="ai-bot-toggle" id="aiBotToggle">
            <i class="ph-fill ph-robot"></i>
        </button>
        <div class="ai-bot-window hidden" id="aiBotWindow">
            <div class="ai-bot-header">
                <div class="ai-avatar">
                    <i class="ph-fill ph-robot"></i>
                </div>
                <div>
                    <h4>Symphony Assistant</h4>
                    <span>Smart Matching System</span>
                </div>
                <button class="close-bot" id="closeBot"><i class="ph ph-x"></i></button>
            </div>
            <div class="ai-bot-messages" id="aiBotMessages">
                <!-- Messages injected via JS -->
            </div>
            <div class="ai-bot-input">
                <div class="preset-options" id="aiBotOptions">
                    <!-- Options injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/browse.js"></script>
    <script type="module" src="js/ai-bot.js"></script>
</body>
</html>
