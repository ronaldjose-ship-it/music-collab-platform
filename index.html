<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Login - Symphony</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar glass">
        <div class="nav-container">
            <a href="browse.html" class="logo">
                <i class="ph-fill ph-music-notes-simple"></i>
                <span class="logo-text">Symphony</span>
            </a>
            <div class="nav-links">
                <a href="browse.html">Browse</a>
                <a href="upload.html">Upload</a>
                <a href="favourites.html" id="navFavouritesLink" style="display:none;">Favourites</a>
                <a href="studios.html" id="navStudiosLink" style="display:none;">Studios</a>
                <a href="profile.html">My Profile</a>
                <a href="index.html" class="active" id="navAuthLink">Login</a>
            </div>
            <button class="menu-toggle"><i class="ph ph-list"></i></button>
        </div>
    </nav>

    <main class="main-content" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
        <div class="card glass" style="width: 100%; max-width: 450px; padding: 40px; margin-top: 50px;">
            <div style="text-align: center; margin-bottom: 32px;">
                <i class="ph-fill ph-user-circle"
                    style="font-size: 3rem; color: var(--primary-color); margin-bottom: 16px;"></i>
                <h2 id="authTitle">Artist Portal</h2>
                <p style="color: var(--text-secondary); font-size: 0.9rem;" id="authSubtitle">Sign in to upload your
                    tracks and manage your portfolio.</p>
            </div>

            <form id="authForm">
                <div class="form-group" id="nameGroup" style="display: none;">
                    <label for="artistName">Artist Name</label>
                    <input type="text" id="artistName" class="glass-input" placeholder="Your stage name">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="glass-input" placeholder="artist@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="glass-input" placeholder="••••••••" required
                        minlength="6">
                </div>

                <div id="authError"
                    style="color: #ef4444; font-size: 0.85rem; margin-bottom: 16px; display: none; text-align: center;">
                </div>

                <button type="submit" class="btn-primary" id="authBtn">Sign In</button>

                <div style="text-align: center; margin-top: 12px; font-size: 0.85rem;" id="forgotPasswordContainer">
                    <a href="#" id="forgotPasswordLink"
                        style="color: var(--text-secondary); text-decoration: underline;">Forgot Password?</a>
                </div>

                <div id="resetFeedback"
                    style="color: var(--success); font-size: 0.85rem; margin-top: 12px; display: none; text-align: center;">
                    Reset email sent! Check your inbox.</div>

                <div style="text-align: center; margin-top: 24px; font-size: 0.9rem;">
                    <span style="color: var(--text-secondary);" id="togglePrompt">New to Symphony?</span>
                    <a href="#" id="toggleAuthMode"
                        style="color: var(--primary-color); font-weight: 500; margin-left: 8px;">Create an Account</a>
                </div>
            </form>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/login.js"></script>
</body>

</html>
