<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony - My Favourites</title>
    <meta name="description" content="Listen to your favourite tracks on Symphony.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass">
        <div class="nav-container">
            <a href="browse.html" class="logo">
                <i class="ph-fill ph-music-notes-simple"></i>
                <span class="logo-text">Symphony</span>
            </a>
            <div class="nav-links">
                <a href="browse.html">Browse</a>
                <a href="upload.html">Upload</a>
                <a href="favourites.html" class="active" id="navFavouritesLink" style="display:none;">Favourites</a>
                <a href="profile.html" id="navProfileLink" style="display:none;">My Profile</a>
                <a href="studios.html" id="navStudiosLink" style="display:none;">Studios</a>
                <a href="chat.html" id="navChatLink" style="display:none;">Messages</a>
                <a href="index.html" id="navAuthLink">Login</a>
                <a href="#" id="navLogoutLink" style="display:none; color:var(--accent-color);">Logout</a>
            </div>
            <button class="menu-toggle" aria-label="Toggle Menu">
                <i class="ph ph-list"></i>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1>My Playlist</h1>
                <p>A collection of your favourite tracks, automatically played in sequence.</p>
            </div>
        </header>

        <section class="tracks-grid" id="favouritesContainer">
            <!-- Loading state -->
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <p>Loading your favourites...</p>
            </div>
            <!-- Tracks will be injected here via JS -->
        </section>
    </main>

    <!-- Global Audio Player (Hidden until play is clicked) -->
    <div class="global-player" id="globalPlayer">
        <div class="player-info">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=150&auto=format&fit=crop" alt="Cover" class="player-cover" id="playerCover">
            <div class="player-text">
                <h4 id="playerTitle">Track Title</h4>
                <p id="playerArtist">Artist Name</p>
            </div>
        </div>
        <div class="player-controls">
            <button class="control-btn" id="prevBtn"><i class="ph-fill ph-skip-back"></i></button>
            <button class="control-btn play-btn" id="playPauseBtn"><i class="ph-fill ph-play"></i></button>
            <button class="control-btn" id="nextBtn"><i class="ph-fill ph-skip-forward"></i></button>
        </div>
        <div class="player-progress">
            <span id="currentTime">0:00</span>
            <div class="progress-bar-container" id="progressBarContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <span id="durationTime">0:00</span>
        </div>
        <audio id="audioElement"></audio>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/favourites.js"></script>
</body>
</html>
