<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Symphony</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass">
        <div class="nav-container">
            <a href="browse.html" class="logo">
                <i class="ph-fill ph-music-notes-simple"></i>
                <span class="logo-text">Symphony</span>
            </a>
            <div class="nav-links">
                <a href="browse.html">Browse</a>
                <a href="upload.html">Upload</a>
                <a href="favourites.html" id="navFavouritesLink" style="display:none;">Favourites</a>
                <a href="profile.html" id="navProfileLink" style="display:none;">My Profile</a>
                <a href="studios.html" id="navStudiosLink" style="display:none;">Studios</a>
                <a href="chat.html" id="navChatLink" style="display:none;" class="active">Messages</a>
                <a href="index.html" id="navAuthLink">Login</a>
                <a href="#" id="navLogoutLink" style="display:none; color:var(--accent-color);">Logout</a>
            </div>
            <button class="menu-toggle"><i class="ph ph-list"></i></button>
        </div>
    </nav>

    <main class="main-content" style="max-width: 1400px;">
        <div class="chat-layout">
            <!-- Sidebar with contacts -->
            <div class="chat-sidebar card glass">
                <div style="padding: 16px; border-bottom: 1px solid var(--border-color);">
                    <h3 style="margin-bottom:12px;">Conversations</h3>
                    <div class="search-bar">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" placeholder="Search messages..." style="width:100%; padding:8px 16px 8px 36px; border-radius:var(--radius-full); background:var(--surface-light); border:none; color:white; outline:none;">
                    </div>
                </div>
                <div class="contacts-list" id="contactsList" style="overflow-y:auto; flex-grow:1;">
                    <!-- Dynamically populated contacts -->
                    <div style="padding:16px; color:var(--text-secondary);">Loading conversations...</div>
                </div>
            </div>
            
            <!-- Chat main area -->
            <div class="chat-main card glass">
                <div style="padding: 16px 24px; border-bottom: 1px solid var(--border-color); display:flex; align-items:center; gap:16px; background:transparent;">
                    <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?q=80&w=100&auto=format&fit=crop" id="chatHeaderAvatar" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <div>
                        <h3 id="chatHeaderName" style="font-size:1.1rem;">Select Chat</h3>
                        <p id="chatHeaderStatus" style="font-size:0.8rem; color:var(--success);"></p>
                    </div>
                </div>
                
                <div class="chat-messages" id="chatMessages" style="display:flex; flex-direction:column; gap:16px;">
                    <!-- Messages populated via JS -->
                </div>
                
                <div class="chat-input-area">
                    <button style="background:none; border:none; color:var(--text-secondary); font-size:1.5rem; cursor:pointer;" onclick="document.getElementById('attachInput').click()"><i class="ph ph-paperclip"></i></button>
                    <input type="file" id="attachInput" style="display:none;">
                    <input type="text" id="messageInput" class="glass-input" placeholder="Type a message..." style="flex-grow:1;">
                    <button class="btn-primary" id="sendBtn" style="width:auto; padding:12px; border-radius:50%; width:46px; height:46px; display:flex; justify-content:center; align-items:center;">
                        <i class="ph-fill ph-paper-plane-tilt" style="font-size:1.2rem;"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/chat.js"></script>
</body>
</html>
